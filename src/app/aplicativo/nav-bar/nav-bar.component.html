<div class="navbar">
    <div class="logo-section" (click)="selectPhase('fase3')">
       <img src="assets/img/logo.png" class="img-navbar" alt="Logo Zodiaco" />
       <span class="logo-title">Zodiaco</span>
    </div>
    <ul class="nav-links">
        @for (item of navItems; track item.id) {
            <li>
                <a 
                  href="javascript:void(0)" 
                  [class.active]="item.id === activePhase" 
                  (click)="selectPhase(item.id)"
                >
                  {{ item.nombre }}
                </a>
            </li>
        }
    </ul>
</div>
